name: Deploy FTP

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: FTP Deploy (public_html)
        id: ftp_public
        continue-on-error: true
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ostudios.ftp.dhosting.pl
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21
          protocol: ftp
          timeout: 120000
          log-level: verbose
          server-dir: /public_html/

      - name: FTP Deploy (relationshipscan public_html)
        id: ftp_rel
        continue-on-error: true
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ostudios.ftp.dhosting.pl
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21
          protocol: ftp
          timeout: 120000
          log-level: verbose
          server-dir: /relationshipscan.app/public_html/

      - name: FTP Deploy (domains relationshipscan public_html)
        id: ftp_domains
        continue-on-error: true
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ostudios.ftp.dhosting.pl
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21
          protocol: ftp
          timeout: 120000
          log-level: verbose
          server-dir: /domains/relationshipscan.app/public_html/

      - name: Ensure at least one FTP target succeeded
        run: |
          if [ "${{ steps.ftp_public.outcome }}" = "success" ] || [ "${{ steps.ftp_rel.outcome }}" = "success" ] || [ "${{ steps.ftp_domains.outcome }}" = "success" ]; then
            echo "At least one FTP target succeeded."
            exit 0
          fi
          echo "All FTP targets failed."
          exit 1

      - name: Verify live content marker
        run: |
          python3 - <<'PY'
          import sys, urllib.request, time
          required = "RelationshipScan"
          ok = False
          for i in range(12):
              url = f"https://relationshipscan.app/index.html?ci=deploy-check-{i}"
              body = urllib.request.urlopen(url, timeout=20).read().decode("utf-8", "ignore")
              if required in body:
                  print("Live check OK: updated marker detected.")
                  ok = True
                  break
              time.sleep(5)
          if not ok:
              print("Live check failed: expected marker not found after retries.")
              sys.exit(1)
          PY

name: Deploy FTP

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: FTP Deploy (try 1/3)
        id: ftp1
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        continue-on-error: true
        with:
          server: ostudios.ftp.dhosting.pl
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21
          protocol: ftp
          timeout: 120000
          log-level: verbose
          server-dir: /

      - name: FTP Deploy (try 2/3)
        id: ftp2
        if: steps.ftp1.outcome == 'failure'
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        continue-on-error: true
        with:
          server: ostudios.ftp.dhosting.pl
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21
          protocol: ftp
          timeout: 120000
          log-level: verbose
          server-dir: /

      - name: FTP Deploy (try 3/3)
        id: ftp3
        if: steps.ftp1.outcome == 'failure' && steps.ftp2.outcome == 'failure'
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ostudios.ftp.dhosting.pl
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21
          protocol: ftp
          timeout: 120000
          log-level: verbose
          server-dir: /

      - name: Require at least one FTP success
        if: always()
        run: |
          o1="${{ steps.ftp1.outcome }}"
          o2="${{ steps.ftp2.outcome }}"
          o3="${{ steps.ftp3.outcome }}"
          echo "outcomes: $o1 / $o2 / $o3"
          if [ "$o1" = "success" ] || [ "$o2" = "success" ] || [ "$o3" = "success" ]; then
            exit 0
          fi
          exit 1

      - name: Verify live content marker
        run: |
          python3 - <<'PY'
          import sys, urllib.request
          url = "https://relationshipscan.app/index.html?ci=deploy-check"
          body = urllib.request.urlopen(url, timeout=20).read().decode("utf-8", "ignore")
          required = "Start your scan"
          if required not in body:
              print("Live check failed: expected marker not found.")
              sys.exit(1)
          print("Live check OK: updated marker detected.")
          PY

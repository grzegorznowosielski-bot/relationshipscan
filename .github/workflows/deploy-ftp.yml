# Wgranie statycznej strony na dhosting przez FTP po każdym pushu na main.
# W GitHub: Settings → Secrets and variables → Actions — dodaj:
#   FTP_SERVER      (np. ostudios.ftp.dhosting.pl)
#   FTP_USERNAME    (użytkownik FTP z panelu / PDF)
#   FTP_PASSWORD    (hasło — po zmianie w dPanel wklej nowe)
# Katalog wg dPanel (ścieżka względem rootu FTP — musi kończyć się na /).
# MUSI być DOKŁADNIE tym samym katalogiem co „Katalog WWW” / docroot domeny relationshipscan.app.
#
# Burdel „public_html/public_html/…” na FTP = pliki szły do ZŁEGO miejsca (zagnieżdżenie),
# a Apache/nginx serwuje stronę z INNEGO folderu — stąd stary wygląd mimo zielonego CI.
# Nie wgrywaj „na oko” do drugiego public_html — porównaj ścieżkę z panelem (jedna warstwa).
#
# Dla domeny w podkatalogu (w rootcie FTP widać folder relationshipscan.app):
#   server-dir: /relationshipscan.app/public_html/
# Gdy panel mówi, że docroot to główny public_html konta (bez podfolderu domeny):
#   server-dir: /public_html/
# Nigdy nie kumuluj ścieżek tak, żeby powstało public_html/public_html — to znak błędu.
#
# Sprzątanie: po ustawieniu poprawnego server-dir możesz w FileZilli usunąć pusty/nieużywany
# zagnieżdżony public_html (najpierw upewnij się, który katalog jest docroot w panelu).

name: Deploy (FTP → dhosting)

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-ftp-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ECONNRESET na „data socket” z FTPS zdarza się z Actions → dhosting: najpierw zwykły FTP:21.
      # Jak hosting wymusza tylko szyfrowanie, zmień na protocol: ftps-legacy lub ftps.
      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./
          # Panel: ~/relationshipscan.app/public_html/ (= docroot) → przy rootcie FTP = ~ użyj:
          server-dir: /relationshipscan.app/public_html/
          protocol: ftp
          port: 21
          timeout: 300000
          log-level: verbose
          dry-run: false

      - name: Verify live CSS (docroot = server-dir)
        run: |
          set -e
          BODY=$(curl -fsSL "https://relationshipscan.app/style.css?deploy_check=${{ github.run_id }}")
          echo "$BODY" | head -25
          if echo "$BODY" | grep -qi 'ff4f9a'; then
            echo "::error::Na serwerze nadal jest STARY style.css (róż). Pliki idą w złe miejsce — zmień server-dir zgodnie z docroot domeny w panelu hostingu."
            exit 1
          fi
          if ! echo "$BODY" | grep -q '1d4ed8'; then
            echo "::error::Live style.css nie zawiera oczekiwanej palety (#1d4ed8). Sprawdź server-dir i cache."
            exit 1
          fi
          echo "OK: live style.css wygląda na aktualną wersję z repozytorium."

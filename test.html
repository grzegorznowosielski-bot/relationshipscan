<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="RelationshipScan test: quick questions to generate your Trust Index." />
  <meta name="robots" content="noindex, follow" />
  <title>Scan — RelationshipScan</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,400;0,14..32,500;0,14..32,600;0,14..32,700;1,14..32,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css?v=20260420j" />
</head>
<body class="page page--test">
  <header class="site-header site-header--minimal">
    <div class="container site-header__inner">
      <a class="logo" href="index.html">RelationshipScan</a>
      <div class="test-header-tools">
        <a class="btn btn--ghost btn--sm" href="index.html">Back to home</a>
      </div>
    </div>
  </header>

  <main class="test-main">
    <div class="container test-layout">
      <div class="test-progress-meta">
        <p class="test-meta" id="test-step-label">Question 1 of 10</p>
        <p class="test-progress-percent" id="test-progress-percent">10%</p>
      </div>
      <div class="test-progress" aria-hidden="true">
        <div class="test-progress__bar" id="progress-bar" style="width: 10%"></div>
      </div>
      <p class="test-progress-hint" id="test-progress-hint"></p>

      <form id="test-form" class="test-form" novalidate>
        <div id="question-root" class="question-card reveal"></div>
        <div class="test-actions">
          <button type="button" class="btn btn--ghost" id="btn-prev" hidden>Back</button>
          <button type="button" class="btn btn--primary btn--lg btn--accent" id="btn-next" disabled>Next</button>
        </div>
      </form>
    </div>
  </main>

  <footer class="site-footer site-footer--minimal">
    <div class="container site-footer__inner">
      <p class="disclaimer-inline" id="test-disclaimer">Answer based on recent weeks. There are no right or wrong answers.</p>
      <p class="site-footer__links">
        <a href="privacy.html">Privacy Policy</a> · <a href="terms.html">Terms &amp; Conditions</a> · <a href="contact.html">Contact</a>
      </p>
    </div>
  </footer>

  <!-- Konfiguracja pytań w osobnym pliku JS -->
  <script src="/locale.config.js"></script>
  <script src="script.js?v=20260422paymentsfix" defer></script>
</body>
</html>

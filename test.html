<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Test RelationshipScan — ok. 5 minut, 20 pytań, skala 1–5. Wynik zapisuje się lokalnie." />
  <meta name="robots" content="noindex, follow" />
  <title>Test — RelationshipScan</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,400;0,14..32,500;0,14..32,600;0,14..32,700;1,14..32,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css?v=20260422" />
</head>
<body class="page page--test">
  <header class="site-header site-header--minimal">
    <div class="container site-header__inner">
      <a class="logo" href="index.html">RelationshipScan</a>
      <span class="test-badge">Test</span>
    </div>
  </header>

  <main class="test-main">
    <div class="container test-layout">
      <!-- Pasek postępu -->
      <div class="test-progress" aria-hidden="true">
        <div class="test-progress__bar" id="progress-bar" style="width: 0%"></div>
      </div>
      <p class="test-meta" id="test-step-label">Pytanie 1 z 20</p>

      <!-- Kontener na treść pytania (wypełniany przez JS) -->
      <form id="test-form" class="test-form" novalidate>
        <div id="question-root" class="question-card reveal"></div>
        <div class="test-actions">
          <button type="button" class="btn btn--ghost" id="btn-prev" hidden>Wstecz</button>
          <button type="button" class="btn btn--primary btn--lg" id="btn-next">Dalej</button>
        </div>
      </form>
    </div>
  </main>

  <footer class="site-footer site-footer--minimal">
    <div class="container">
      <p class="disclaimer-inline">Odpowiadaj według ostatnich tygodni. Nie ma „dobrych” odpowiedzi.</p>
    </div>
  </footer>

  <!-- Konfiguracja pytań w osobnym pliku JS -->
  <script src="script.js?v=20260422" defer></script>
</body>
</html>

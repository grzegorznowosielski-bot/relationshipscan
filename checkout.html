<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Dostęp do testu RelationshipScan — symulacja płatności, start testu online." />
  <meta name="robots" content="noindex, follow" />
  <title>Płatność — RelationshipScan | Dostęp do testu</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,400;0,14..32,500;0,14..32,600;0,14..32,700;1,14..32,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css?v=20260419" />
</head>
<body class="page page--checkout">
  <header class="site-header site-header--minimal">
    <div class="container site-header__inner">
      <a class="logo" href="index.html">RelationshipScan</a>
    </div>
  </header>

  <main class="checkout-main">
    <div class="container checkout-wrap reveal">
      <!-- Karta podsumowania zamówienia (FAKE checkout) -->
      <div class="checkout-card">
        <p class="eyebrow">Podsumowanie</p>
        <h1 class="checkout-card__title">RelationshipScan</h1>
        <p class="checkout-card__desc">Dostęp do testu online i interpretacji wyniku w przeglądarce.</p>
        <div class="checkout-card__row">
          <span>Kwota</span>
          <strong class="checkout-card__price">29 zł</strong>
        </div>
        <p class="checkout-card__fake">Symulacja płatności — bez prawdziwej transakcji. Po kliknięciu przejdziesz do testu.</p>
        <button type="button" class="btn btn--primary btn--lg btn--block" id="btn-pay" data-next="test.html">
          Zapłać i rozpocznij
        </button>
        <a class="checkout-card__back" href="index.html">← Wróć na stronę główną</a>
      </div>
    </div>
  </main>

  <footer class="site-footer site-footer--minimal">
    <div class="container site-footer__inner">
      <p class="site-footer__note">Bezpieczne przekierowanie do testu po symulacji płatności.</p>
    </div>
  </footer>

  <script src="script.js" defer></script>
</body>
</html>
